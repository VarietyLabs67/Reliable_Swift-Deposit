<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monetbil Deposit Portal</title>

<style>

body{
    font-family: Arial;
    background:#f4f4f4;
    padding:40px;
}

.box{
    max-width:350px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input, button{
    width:100%;
    padding:12px;
    margin-top:10px;
    box-sizing:border-box;
}

button{
    background:#009688;
    color:white;
    border:none;
}

#result{
    margin-top:20px;
    word-break:break-word;
}

</style>

</head>

<body>

<div class="box">

<h2>Deposit Funds</h2>

<input
    type="number"
    id="amount"
    placeholder="Amount (XAF)"
>

<input
    type="text"
    id="phone"
    placeholder="2376XXXXXXXX"
>

<button onclick="payNow()">
    Pay Now
</button>

<div id="result"></div>

</div>

<script>

async function payNow() {

    const amount =
        document.getElementById("amount").value;

    const phone =
        document.getElementById("phone").value;

    const result =
        document.getElementById("result");

    result.innerHTML = "Initializing payment...";

    try {

        const response = await fetch(
            "https://api.monetbil.com/payment/v1/placePayment",
            {
                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({

                    service: "NyoavGYNbAkZ8TkF8iQqa9rqPhcM4Mby",

                    phonenumber: phone,

                    amount: amount,

                    country: "CM",

                    currency: "XAF"

                })

            }
        );

        const data = await response.json();

        console.log(data);

        if (data.status === "REQUEST_ACCEPTED") {

            result.innerHTML =

                "Payment request sent successfully.<br><br>" +

                "Check your phone for Mobile Money prompt.<br><br>" +

                "Payment ID: " +

                data.paymentId;

        } else {

            result.innerHTML =

                "Payment failed:<br><br>" +

                JSON.stringify(data);

        }

    } catch(error) {

        console.log(error);

        result.innerHTML =

            "Network/CORS Error:<br><br>" +

            error;

    }

}

</script>

</body>
</html>
