<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monetbil Checkout</title>

<style>

body{
    font-family: Arial;
    background:#f4f4f4;
    padding:40px;
}

.box{
    max-width:350px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input, select, button{
    width:100%;
    padding:12px;
    margin-top:10px;
    box-sizing:border-box;
}

button{
    background:#009688;
    color:white;
    border:none;
}

#result{
    margin-top:20px;
}

</style>
</head>

<body>

<div class="box">

<h2>Deposit Funds</h2>

<input
    type="number"
    id="amount"
    placeholder="Amount (XAF)"
>

<input
    type="text"
    id="phone"
    placeholder="2376XXXXXXXX"
>

<select id="operator">

    <option value="CM_MTNMOBILEMONEY">
        MTN Mobile Money
    </option>

    <option value="CM_ORANGEMONEY">
        Orange Money
    </option>

</select>

<button onclick="payNow()">
    Pay Now
</button>

<div id="result"></div>

</div>

<script>

function payNow(){

    const amount =
        document.getElementById("amount").value;

    const phone =
        document.getElementById("phone").value;

    const operator =
        document.getElementById("operator").value;

    if(amount === "" || phone === ""){

        alert("Fill all fields");

        return;
    }

    const serviceKey =
        "j9XjZzkFqjeL5fk34e1RNq98thRRwvYf";

    const url =
        "https://api.monetbil.com/widget/v2.1/" +
        serviceKey +
        "?amount=" + amount +
        "&phone=" + phone +
        "&operator=" + operator +
        "&country=CM" +
        "&currency=XAF";

    window.location.href = url;
}

</script>

</body>
</html>
